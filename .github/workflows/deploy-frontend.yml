name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Run CI only (skip S3/CloudFront deploy)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  AWS_REGION: ap-southeast-2
  S3_BUCKET: myresume-frontend-041875151540
  CLOUDFRONT_DISTRIBUTION_ID: E2VLNB8O1DB4Y7
  NEXT_PUBLIC_API_URL: https://d33qsa6f99h2bi.cloudfront.net/api
  INTERNAL_API_URL: http://myresume-alb-1732503466.ap-southeast-2.elb.amazonaws.com/api

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          INTERNAL_API_URL: ${{ env.INTERNAL_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/
          retention-days: 1

  deploy:
    name: Deploy to S3 + CloudFront
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_deploy != 'true' }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: out/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync out/ s3://${{ env.S3_BUCKET }}/ --delete --region ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --region us-east-1
