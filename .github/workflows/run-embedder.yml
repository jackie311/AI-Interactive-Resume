name: Run Embedder

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev
    paths:
      - "backend/data/resume.yaml"
      - "backend/data/projects.yaml"

env:
  AWS_REGION: ap-southeast-2
  ECR_REGISTRY: 041875151540.dkr.ecr.ap-southeast-2.amazonaws.com
  ECR_REPOSITORY: myresume-backend
  ECS_CLUSTER: myresume-cluster
  TASK_DEFINITION: myresume-backend
  SUBNET: subnet-03ff39fd91d5192dd
  SECURITY_GROUP: sg-0cfa3c2e86d87e0a0

jobs:
  embed:
    name: Build new image → embed data → restart backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image with latest data
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker build -t $IMAGE ./backend
          docker push $IMAGE
          echo "Pushed new image: $IMAGE"

      - name: Register new task definition revision with latest image
        id: register-task
        run: |
          # Get current task definition and update image to force ECS to pull latest
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION }} \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          # Update image to include sha to force a fresh pull
          for c in td['containerDefinitions']:
              if c['name'] == 'backend':
                  c['image'] = '${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest'
          # Remove fields that can't be re-registered
          for key in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          print(json.dumps(td))
          ")

          NEW_REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_def_arn=$NEW_REVISION" >> "$GITHUB_OUTPUT"
          echo "Registered new task definition: $NEW_REVISION"

      - name: Run embedder task on ECS Fargate
        id: run-task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition ${{ steps.register-task.outputs.task_def_arn }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ env.SUBNET }}],securityGroups=[${{ env.SECURITY_GROUP }}],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"backend","command":["python","rag/embedder.py"]}]}' \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"
          echo "Started ECS task: $TASK_ARN"

      - name: Wait for embedder task to complete
        run: |
          aws ecs wait tasks-stopped \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks ${{ steps.run-task.outputs.task_arn }} \
            --region ${{ env.AWS_REGION }}
          echo "Embedder task finished."

      - name: Check task exit code
        run: |
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks ${{ steps.run-task.outputs.task_arn }} \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)
          echo "Exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Embedder failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Embedding completed successfully."

      - name: Restart backend service to pick up new embeddings
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service myresume-backend-service \
            --task-definition ${{ steps.register-task.outputs.task_def_arn }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "Backend restarting with fresh embeddings..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services myresume-backend-service \
            --region ${{ env.AWS_REGION }}
          echo "Backend is live with updated data."
