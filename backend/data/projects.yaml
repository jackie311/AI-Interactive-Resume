projects:
  - id: ai-portfolio
    name: AI Interactive Resume
    tagline: RAG + LLM + AWS — a full AI engineering project, deployed to production
    description: >
      Designed and built an AI-powered portfolio from scratch. The core is a RAG pipeline:
      resume data (YAML) is chunked and embedded with HuggingFace sentence transformers into
      ChromaDB, then retrieved at query time to ground Claude's responses in real facts.
      The backend is a Python FastAPI app that streams responses over SSE. The frontend is
      Next.js with a real-time chat panel. The entire stack is deployed on AWS — ECS Fargate
      (backend), S3 + CloudFront (frontend), EFS (ChromaDB persistence), ECR (Docker images) —
      with GitHub Actions CI/CD for automated deployments.
    problem: >
      Static resumes don't let recruiters explore your background naturally.
      More importantly, I wanted a hands-on AI engineering project that covers
      the full stack: LLM integration, vector search, RAG pipeline design, streaming
      inference, and production cloud deployment.
    solution: >
      Built the entire system end-to-end: YAML data → HuggingFace embeddings → ChromaDB
      vector store → LangChain retrieval → Claude API streaming → FastAPI SSE → Next.js chat UI.
      Deployed on AWS with ECS Fargate + EFS for persistent vector storage, fronted by
      CloudFront with API routing to ALB.
    impact: >
      Production RAG system live at jackiejin.dev. Demonstrates end-to-end AI engineering:
      pipeline design, embedding strategy, LLM orchestration, streaming architecture, and
      cloud-native deployment.
    tech: [Python, FastAPI, LangChain, ChromaDB, HuggingFace Embeddings, Claude API, Next.js, TypeScript, AWS ECS, AWS EFS, CloudFront, Docker, GitHub Actions]
    github: https://github.com/jackie311/AI-Interactive-Resume
    live: https://d33qsa6f99h2bi.cloudfront.net
    featured: true
    year: 2026

  - id: bear
    name: BEAR — Booking Entity Authorisation Reporting
    tagline: Government reporting platform for regulatory workflows across internal staff and external auditors
    description: >
      Developed and delivered a government reporting platform supporting regulatory workflows for internal
      staff and external auditors at the Department of Transport and Main Roads (TMR). Built complex,
      data-driven user interfaces including dynamic form systems and administrative dashboards to handle
      structured data submission and validation. Designed and implemented responsive, cross-device interfaces
      (desktop, tablet, mobile), ensuring consistent user experience across multiple form factors. Ensured
      full compliance with WCAG accessibility standards, balancing usability with strict government
      requirements. Collaborated in an agile team environment (2-week sprints), working closely with backend
      engineers, stakeholders, and auditors to deliver stable and scalable features. Integrated APIs and
      handled complex data flows, enabling reliable data processing and real-time user interactions.
      Contributed to CI/CD workflows using GitHub Actions, supporting multiple deployment environments and
      improving release efficiency.
    problem: >
      Complex compliance reporting needed to serve both government staff and external auditors simultaneously,
      meeting strict WCAG accessibility standards while iterating quickly under tight sprint pressure across
      multiple device form factors.
    solution: >
      Designed reusable component libraries and frontend architecture patterns to improve consistency and
      maintainability across the application. Integrated APIs to handle complex data flows and built
      responsive interfaces across desktop, tablet, and mobile. Contributed to CI/CD pipelines via GitHub
      Actions to support multiple deployment environments and reliable releases.
    impact: >
      Delivered features reliably under tight sprint cycles while maintaining system stability in a
      multi-stakeholder environment. Improved development efficiency and reduced future maintenance costs
      through standardised frontend architecture.
    tech: [React, Next.js, TypeScript, AWS, GitHub Actions]
    github: null
    live: null
    featured: true
    year: 2024

  - id: qantas-platforms
    name: Qantas Digital Platforms
    tagline: From maintaining mission-critical pilot apps to independently delivering a new production system end-to-end
    description: >
      Contributed to multiple Qantas operational platforms, including iPad applications (ELogbook, QETouch)
      used by pilots and engineers, and an administrative dashboard for internal users. Maintained and
      enhanced the dashboard system, debugging and resolving issues across both frontend and backend to
      ensure reliability in a production-critical environment. Worked with React Native-based mobile
      applications despite no prior iOS experience, quickly ramping up and contributing to cross-platform
      fixes and improvements. Participated in monthly release cycles across multiple applications, supporting
      deployment coordination and ensuring stable production releases. Acted as release-day support and backup
      lead during Qantas release windows, assisting in issue triage, communication, and system monitoring.
      Independently designed and built the Port Supervisor Page from initial hand-drawn concepts to
      production, taking ownership of frontend development and integrating with existing backend systems via
      new API endpoints. Collaborated with internal cloud teams to deploy using Kubernetes and ArgoCD,
      leveraging internal documentation and cross-team communication despite limited prior exposure.
      Established deployment pipelines across dev, test, and production environments, improving release
      consistency and reducing manual effort.
    problem: >
      Two separate challenges: (1) maintain and enhance production-critical aviation platforms used by pilots
      and engineers across mobile and web, and (2) deliver a brand-new internal tool from two hand-drawn
      sketches with no prior design or requirements — then deploy it in a technology stack (Kubernetes/ArgoCD)
      I had never used before.
    solution: >
      For ongoing platforms: ramped up quickly on React Native despite no iOS background, contributed
      cross-platform fixes, and served as release-day backup lead to keep production stable.
      For the Port Supervisor Page: owned the full product lifecycle — from interpreting rough sketches into
      a real UI, through to new backend API endpoints and cloud deployment. Self-taught Kubernetes and ArgoCD
      through internal documentation and cross-team collaboration to get it shipped.
    impact: >
      Port Supervisor Page reduced deployment time from ~40 minutes to 12 minutes (~70% improvement) through
      improved CI/CD workflows. Ensured stable operation of mission-critical systems through effective
      debugging, release support, and cross-team collaboration. Progressed from system maintenance to
      independently delivering a new production system end-to-end.
    tech: [React Native, React, Node.js, TypeScript, AWS Cognito, Kubernetes, ArgoCD]
    github: null
    live: null
    featured: true
    year: 2023

