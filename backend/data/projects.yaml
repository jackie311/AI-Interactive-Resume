projects:
  - id: ai-portfolio
    name: AI Interactive Resume
    tagline: RAG + LLM + AWS — a full AI engineering project, deployed to production
    description: >
      Designed and built an AI-powered portfolio from scratch. The core is a RAG pipeline:
      resume data (YAML) is chunked and embedded with HuggingFace sentence transformers into
      ChromaDB, then retrieved at query time to ground Claude's responses in real facts.
      The backend is a Python FastAPI app that streams responses over SSE. The frontend is
      Next.js with a real-time chat panel. The entire stack is deployed on AWS — ECS Fargate
      (backend), S3 + CloudFront (frontend), EFS (ChromaDB persistence), ECR (Docker images) —
      with GitHub Actions CI/CD for automated deployments.
    problem: >
      Static resumes don't let recruiters explore your background naturally.
      More importantly, I wanted a hands-on AI engineering project that covers
      the full stack: LLM integration, vector search, RAG pipeline design, streaming
      inference, and production cloud deployment.
    solution: >
      Built the entire system end-to-end: YAML data → HuggingFace embeddings → ChromaDB
      vector store → LangChain retrieval → Claude API streaming → FastAPI SSE → Next.js chat UI.
      Deployed on AWS with ECS Fargate + EFS for persistent vector storage, fronted by
      CloudFront with API routing to ALB.
    impact: >
      Production RAG system live at jackiejin.dev. Demonstrates end-to-end AI engineering:
      pipeline design, embedding strategy, LLM orchestration, streaming architecture, and
      cloud-native deployment.
    tech: [Python, FastAPI, LangChain, ChromaDB, HuggingFace Embeddings, Claude API, Next.js, TypeScript, AWS ECS, AWS EFS, CloudFront, Docker, GitHub Actions]
    github: https://github.com/jackie311/ai-portfolio
    live: https://d33qsa6f99h2bi.cloudfront.net
    featured: true
    year: 2026

  - id: qantas-platforms
    name: Qantas Digital Platforms
    tagline: Full-stack ownership + 70% faster deployments via K8s and ArgoCD
    description: >
      Maintained and enhanced multiple Qantas digital platforms — ELogbook, QETouch (mobile apps),
      and the Port Supervisor Page (web). Independently owned the Port Supervisor Page from
      conception to production: full-stack development plus cloud infrastructure. Designed and
      implemented a CI/CD pipeline with Kubernetes and ArgoCD that reduced deployment time from
      40 minutes to 12 minutes.
    problem: >
      Multiple simultaneous platforms with 24/7 availability requirements, coordinated across
      teams and time zones. Slow deployments (40 min) increased risk on every release.
    solution: >
      Took complete ownership of the Port Supervisor Page (frontend, backend, infrastructure).
      Rebuilt the CI/CD pipeline with Kubernetes and ArgoCD for fast, reliable, automated deployments.
    impact: 70% reduction in deployment time (40 min → 12 min); maintained 24/7 availability across all platforms.
    tech: [React Native, Node.js, TypeScript, AWS Cognito, Kubernetes, ArgoCD, Docker]
    github: null
    live: null
    featured: true
    year: 2023

  - id: bear
    name: BEAR — Booking Entity Authorisation Reporting
    tagline: Government compliance platform for Queensland's transport authority
    description: >
      Front-end lead on the BEAR system for the Department of Transport and Main Roads (TMR).
      Delivered a web application serving internal TMR staff and external BEA auditors —
      dynamic form system for report submissions and an interactive admin dashboard —
      within strict two-week agile sprints and WCAG accessibility requirements.
    problem: >
      Complex compliance reporting needed to serve both government staff and external auditors,
      meeting strict accessibility standards while iterating quickly under sprint pressure.
    solution: >
      Built a reusable component library and established front-end architecture patterns
      to accelerate delivery. Worked closely with design and stakeholders to balance
      technical constraints with evolving requirements.
    impact: Consistently shipped sprint commitments; reusable components reduced maintenance cost and improved team velocity.
    tech: [TypeScript, React, Next.js, AWS]
    github: null
    live: null
    featured: true
    year: 2024

  - id: png-police-check
