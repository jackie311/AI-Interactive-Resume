  - id: qantas-platforms
    name: Qantas Digital Platforms
    tagline: Built a full product solo from two sketches — and solved a deployment problem nobody else had cracked
    description: >
      Worked across multiple Qantas digital platforms — ELogbook, QETouch (mobile apps), and the
      Port Supervisor Page (web). The Port Supervisor Page was a greenfield project: the manager
      handed me two hand-drawn UI sketches and I took it from there — self-directed design,
      full-stack development (frontend + backend), and infrastructure, completely solo.
      The ELogbook team manager called me out by name in writing: "your immediate impact, and
      ability to deliver results from day one is truly awesome."
      Separately, the team's CI/CD pipeline was painfully slow (~40 minutes per deployment).
      The team lead asked if Kubernetes could help. I had no prior K8s experience — so I dug
      through Confluence documentation, proactively reached out to engineers across different
      teams on Microsoft Teams, and worked through it with repeated trial and error until it
      worked. The result: CI down to 7–8 minutes, CD down to ~2 minutes.
      Also supported the team's monthly UAT, DEV, and TEST environment deployments and
      production release cycles throughout the engagement.
    problem: >
      Two separate challenges: (1) deliver a brand-new internal tool with minimal requirements
      and no existing design, and (2) fix a slow, risky CI/CD pipeline that nobody on the team
      had solved yet — in a technology I hadn't used before.
    solution: >
      For the Port Supervisor Page: owned the full product lifecycle alone — from interpreting
      rough sketches into a real UI design, through to backend APIs and deployment.
      For the pipeline: self-taught Kubernetes through documentation research and cross-team
      collaboration on Teams, iterated through failures until the pipeline was working and fast.
    impact: >
      Port Supervisor Page shipped and well-received. CI/CD reduced from ~40 min to under 10 min
      (70%+ improvement). Named personally in a manager commendation email. Received repeated
      praise from the Qantas team throughout the engagement.
    tech: [React Native, Node.js, TypeScript, AWS Cognito, Kubernetes, ArgoCD, Docker]
    github: null
    live: null
    featured: true
    year: 2023

