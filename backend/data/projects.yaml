  - id: ncs-cv-tool
    name: NCS Consultant CV Tool
    tagline: Internal automation tool to manage and generate consultant CVs company-wide
    description: >
      After ARQ Group was acquired by NCS Australia, built a centralised CV management system
      to standardise consultant profiles. Used Microsoft Power Apps for the UI, Power Automate
      to auto-generate Word documents from SharePoint data, following Figma designs.
    problem: No consistent CV template post-acquisition; manually managing hundreds of consultant profiles was unsustainable.
    solution: >
      Connected Power Automate to a SharePoint List to generate CVs from a standard template.
      Built a Power Apps interface for staff to search, create, and update consultant CVs.
    impact: Eliminated manual CV formatting company-wide; consistent branding from day one.
    tech: [Microsoft Power Automate, Microsoft Power Apps, SharePoint, Figma]
    github: null
    live: null
    featured: false
    year: 2023

